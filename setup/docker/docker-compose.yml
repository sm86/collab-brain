x-hermes-common: &hermes-common
  image: collab-brain-hermes:latest
  restart: unless-stopped
  init: true
  tty: true
  stdin_open: true
  working_dir: /workspace
  env_file:
    - ./env/hermes.env
  volumes:
    - ../..:/workspace

services:
  hermes-garry:
    <<: *hermes-common
    build:
      context: ../..
      dockerfile: setup/docker/Dockerfile
    container_name: hermes-garry-agent
    environment:
      PARTNER_NAME: Garry
      HERMES_PROFILE_TEMPLATE_DIR: /opt/hermes/mock-garry-profile
      GBRAIN_MOCK_SOURCE: /opt/hermes/mockdata/garry
      GBRAIN_MOCK_IMPORT_MARKER: .mock-garry-imported
      HERMES_COMMAND: hermes gateway run --replace --accept-hooks
      A2A_ENABLED: "true"
      A2A_BIND: 0.0.0.0
      A2A_PORT: 8080
      A2A_PUBLIC_URL: http://localhost:8081
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ../..:/workspace
      - hermes-garry-home:/root

  hermes-monica:
    <<: *hermes-common
    env_file:
      - path: ./env/hermes.env
      - path: ./env/monica.env
        required: false
    container_name: hermes-monica-agent
    environment:
      PARTNER_NAME: Monica
      HERMES_PROFILE_TEMPLATE_DIR: /opt/hermes/mock-monica-profile
      GBRAIN_MOCK_SOURCE: /opt/hermes/mockdata/monica
      GBRAIN_MOCK_IMPORT_MARKER: .mock-monica-imported
      HERMES_COMMAND: hermes gateway run --replace --accept-hooks
      A2A_ENABLED: "true"
      A2A_BIND: 0.0.0.0
      A2A_PORT: 8080
      A2A_PUBLIC_URL: http://localhost:8082
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - ../..:/workspace
      - hermes-monica-home:/root

  hermes-laurie:
    <<: *hermes-common
    container_name: hermes-laurie-agent
    environment:
      PARTNER_NAME: Laurie
      HERMES_PROFILE_TEMPLATE_DIR: /opt/hermes/mock-laurie-profile
      GBRAIN_MOCK_SOURCE: /opt/hermes/mockdata/laurie
      GBRAIN_MOCK_IMPORT_MARKER: .mock-laurie-imported
      A2A_ENABLED: "true"
      A2A_BIND: 0.0.0.0
      A2A_PORT: 8080
      A2A_PUBLIC_URL: http://localhost:8083
    ports:
      - "127.0.0.1:8083:8080"
    volumes:
      - ../..:/workspace
      - hermes-laurie-home:/root

  collab-router-garry:
    image: collab-brain-router:latest
    build:
      context: ../..
      dockerfile: setup/docker/router.Dockerfile
    container_name: collab-router-garry
    restart: unless-stopped
    init: true
    working_dir: /workspace
    env_file:
      - ./env/hermes.env
    environment:
      ROUTER_CALLER: garry
      ROUTER_CONFIG: /workspace/setup/router/config.yaml
      ROUTER_BIND: 0.0.0.0
      ROUTER_PORT: 8090
      DASHBOARD_EVENTS_URL: http://collab-dashboard:8095/admin/events
    volumes:
      - ../..:/workspace

  collab-router-monica:
    image: collab-brain-router:latest
    build:
      context: ../..
      dockerfile: setup/docker/router.Dockerfile
    container_name: collab-router-monica
    restart: unless-stopped
    init: true
    working_dir: /workspace
    env_file:
      - ./env/hermes.env
    environment:
      ROUTER_CALLER: monica
      ROUTER_CONFIG: /workspace/setup/router/config.yaml
      ROUTER_BIND: 0.0.0.0
      ROUTER_PORT: 8090
      DASHBOARD_EVENTS_URL: http://collab-dashboard:8095/admin/events
    volumes:
      - ../..:/workspace

  collab-router-laurie:
    image: collab-brain-router:latest
    build:
      context: ../..
      dockerfile: setup/docker/router.Dockerfile
    container_name: collab-router-laurie
    restart: unless-stopped
    init: true
    working_dir: /workspace
    env_file:
      - ./env/hermes.env
    environment:
      ROUTER_CALLER: laurie
      ROUTER_CONFIG: /workspace/setup/router/config.yaml
      ROUTER_BIND: 0.0.0.0
      ROUTER_PORT: 8090
      DASHBOARD_EVENTS_URL: http://collab-dashboard:8095/admin/events
    volumes:
      - ../..:/workspace

  collab-dashboard:
    image: collab-brain-dashboard:latest
    build:
      context: ../..
      dockerfile: setup/docker/dashboard.Dockerfile
    container_name: collab-router-dashboard
    restart: unless-stopped
    init: true
    environment:
      DASHBOARD_BIND: 0.0.0.0
      DASHBOARD_PORT: 8095
    ports:
      - "127.0.0.1:8095:8095"
    volumes:
      - ../..:/workspace:ro
    depends_on:
      - hermes-garry
      - hermes-monica
      - hermes-laurie

volumes:
  hermes-garry-home:
  hermes-monica-home:
  hermes-laurie-home:
